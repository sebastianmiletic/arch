appId: com.arch.studio.v2
productName: "Arch"
copyright: "2026"
directories:
  output: "release"
  buildResources: "build"
files:
  - "main.js"
  - "electron/*"
  - "!node_modules"
extraResources:
  - from: "server"
    to: "server"
    filter:
      - "dist/**/*"
      - "public/**/*"
      - "package.json"
      - "node_modules/**/*"
mac:
  category: "public.app-category.developer-tools"
  target:
    - target: dir
      arch:
        - arm64
        - x64
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
  icon: "build/icon.icns"
dmg:
  sign: false