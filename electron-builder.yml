appId: com.arch.studio
productName: "Arch"
copyright: "2026"
directories:
  output: "release"
  buildResources: "build"
files:
  - "main.js"
  - "electron/**/*"
extraResources:
  - from: "server"
    to: "server"
    filter:
      - "dist/**/*"
      - "public/**/*"
      - "public/*"
      - "package.json"
      - "node_modules/**/*"
      - "**/*.html"
  - from: "frontend"
    to: "frontend"
    filter:
      - "dist/**/*"
      - "package.json"
mac:
  category: "public.app-category.developer-tools"
  target:
    - target: dir
      arch:
        - arm64
        - x64
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
  mergeASARs: false
  icon: "build/icon.icns"
dmg:
  sign: false
asar: false
