<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
    <linearGradient id="darkLayer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f" />
      <stop offset="100%" stop-color="#151520" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#7c3aed" flood-opacity="0.35" />
    </filter>
  </defs>

  <g transform="translate(50,50) rotate(45)" filter="url(#shadow)">
    <!-- Bottom purple layer (base) -->
    <rect x="-30" y="-5" width="60" height="60" rx="10" ry="10"
          fill="url(#purpleGlow)" stroke="none" />

    <!-- Middle dark layer -->
    <rect x="-30" y="-25" width="60" height="60" rx="10" ry="10"
          fill="url(#darkLayer)" stroke="#2d2d3a" stroke-width="1.5" />

    <!-- Top purple stroke layer -->
    <rect x="-30" y="-45" width="60" height="60" rx="10" ry="10"
          fill="none" stroke="#a855f7" stroke-width="2" />
    <!-- Top inner accent -->
    <rect x="-26" y="-41" width="52" height="52" rx="8" ry="8"
          fill="none" stroke="#c084fc" stroke-width="0.8" opacity="0.5" />
  </g>
</svg>
